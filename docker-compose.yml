version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "33066:3306" 
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  laravel-app:
    build:
      context: .
      dockerfile: Dockerfile.laravel
    restart: always
    ports:
      - "8010:80"
    volumes:
      - .:/var/www/html
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=laravel
      - DB_USERNAME=root
      - DB_PASSWORD=root
    depends_on:
      - db
    command: sh -c "sleep 10 && php artisan migrate --seed --force && chown -R www-data:www-data storage bootstrap/cache && chmod -R 775 storage bootstrap/cache && apache2-foreground"

  no-framework-app:
    build:
      context: .
      dockerfile: Dockerfile.noframework
    restart: always
    ports:
      - "8011:80"
    volumes:
      - ./no-framework:/var/www/html
    environment:
      - DB_HOST=db
      - DB_DATABASE=no_framework_class
      - DB_USERNAME=root
      - DB_PASSWORD=root
    depends_on:
      - db
    command: sh -c "mkdir -p uploads/assignments uploads/submissions uploads/challenges && chown -R www-data:www-data uploads && chmod -R 777 uploads && apache2-foreground"

volumes:
  db_data: